name: Build & Release

on:
  workflow_dispatch:          # Manuell per Knopfdruck auslösbar
    inputs:
      version:
        description: 'Versionsnummer (z.B. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  # ── Windows EXE ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller customtkinter reportlab holidays pdfplumber

      - name: EXE bauen
        run: pyinstaller --onefile --windowed --name "Arbeitsnachweis" arbeitsnachweis.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Arbeitsnachweis.exe

  # ── macOS APP ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller customtkinter reportlab holidays pdfplumber

      - name: APP bauen
        run: pyinstaller --windowed --name "Arbeitsnachweis" arbeitsnachweis.py

      - name: APP zippen
        run: cd dist && zip -r Arbeitsnachweis-mac.zip Arbeitsnachweis.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/Arbeitsnachweis-mac.zip

  # ── Release erstellen (wartet bis beide Builds fertig sind) ────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Windows-Datei laden
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-files/

      - name: macOS-Datei laden
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: release-files/

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Arbeitsnachweis v${{ github.event.inputs.version }}"
          files: |
            release-files/Arbeitsnachweis.exe
            release-files/Arbeitsnachweis-mac.zip
